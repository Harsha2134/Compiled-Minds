ai_usage_summary: |
  Used Antigravity CLI (powered by Gemini) for codebase research, performance profiling, and Layer 3/4 design and integration. No candidate data was sent to any LLM APIs during pipeline execution.

methodology_summary: |
  Three-stage hybrid pipeline: Layer 1 uses streaming generators and a bounded min-heap (capped at 1,500 candidates) with strict location commute hub allowances (Pune, Mumbai, Hyderabad, Delhi NCR, Noida), temporal future signup honeypot excluders, and career filtering. Layer 2 applies dynamic INT8 quantized offline SentenceTransformer (MiniLM) semantic scoring with YOE fits and hopping/closed-source penalties. Layer 3 calibrates relevance via a continuous trust score evaluating 13 metadata anomalies (e.g. cheat proxy, connection farming, bot responders). Layer 4 generates deterministic reasons and alerts.

